<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 제주 미션트립 — 내 정보 조회</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-title" content="나는몇조">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a3a5c">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── 건너뛰기 링크 (2.4.1 A) ── */
    .skip-nav {
      position: absolute; top: -999px; left: 0;
      background: #1a3a5c; color: #fff;
      padding: 8px 16px; border-radius: 0 0 8px 8px;
      font-weight: 700; font-size: 0.9rem; z-index: 9999;
      text-decoration: none;
    }
    .skip-nav:focus { top: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 16px 64px;
    }

    header {
      width: 100%;
      max-width: 480px;
      text-align: center;
      margin-bottom: 12px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
    }

    .toolbar-right {
      display: flex;
      gap: 6px;
    }

    .team-btn {
      background: #3b82f6;
      border-color: #3b82f6;
      color: #fff;
    }
    .team-btn:hover { background: #2563eb; border-color: #2563eb; }
    body.dark .team-btn { background: #1d4ed8; border-color: #1d4ed8; color: #fff; }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a3a5c;
      margin-bottom: 6px;
    }

    header p {
      font-size: 0.9rem;
      color: #6b7a8d;
    }

    main {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #mainView {
      width: 100%;
    }

    .search-box {
      width: 100%;
      max-width: 480px;
      position: relative;
      margin-bottom: 12px;
    }

    /* outline: none 제거 (2.4.7 AA) */
    .search-box input {
      width: 100%;
      padding: 14px 48px 14px 18px;
      font-size: 1rem;
      border: 2px solid #d1dbe8;
      border-radius: 12px;
      background: #fff;
      transition: border-color 0.2s;
      color: #1a3a5c;
    }

    /* 포커스 표시 강화 (2.4.7 AA) */
    .search-box input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.35);
    }

    /* placeholder는 그대로 유지 */
    .search-box input::placeholder {
      color: #aab4c0;
    }

    .search-box .icon {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2rem;
      pointer-events: none;
    }

    #suggestions {
      width: 100%;
      max-width: 480px;
      background: #fff;
      border: 1.5px solid #d1dbe8;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 8px;
      display: none;
    }

    .suggestion-item {
      padding: 12px 18px;
      cursor: pointer;
      font-size: 0.95rem;
      color: #1a3a5c;
      border-bottom: 1px solid #f0f4f8;
      transition: background 0.15s;
    }

    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:hover { background: #eef3fa; }

    /* suggestion-item 포커스 표시 (2.4.7 AA) */
    .suggestion-item:focus-visible { outline: 2px solid #3b82f6; outline-offset: -2px; }

    /* #8fa0b4 → #566879 (1.4.3 AA) */
    .suggestion-item .sub {
      font-size: 0.78rem;
      color: #566879;
      margin-top: 2px;
    }

    #result {
      width: 100%;
      max-width: 480px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(26,58,92,0.08);
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1.5px solid #eef3fa;
    }

    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      color: #fff;
      font-size: 1.4rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-header-text h2 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #1a3a5c;
    }

    /* #8fa0b4 → #566879 (1.4.3 AA) */
    .card-header-text p {
      font-size: 0.82rem;
      color: #566879;
      margin-top: 2px;
    }

    /* 헤더 아래 콘텐츠 — A+/A− 버튼으로 조절 */
    .card-body {
      font-size: 1.2rem;
    }

    .section-title {
      font-size: 1em;
      font-weight: 700;
      color: #3b82f6;
      margin: 16px 0 8px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .info-item {
      background: #f7fafd;
      border-radius: 10px;
      padding: 12px 14px;
    }

    .info-item.full {
      grid-column: 1 / -1;
    }

    /* #8fa0b4 → #566879 (1.4.3 AA) */
    .info-label {
      font-size: 1em;
      color: #566879;
      margin-bottom: 4px;
    }

    .info-value {
      font-size: 1em;
      font-weight: 600;
      color: #1a3a5c;
      white-space: pre-line;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 700;
    }

    .badge-blue  { background: #dbeafe; color: #1d4ed8; }
    .badge-green { background: #d1fae5; color: #065f46; }

    .day-tabs {
      display: flex;
      gap: 8px;
      margin: 16px 0 12px;
    }

    /* #8fa0b4 → #566879 (1.4.3 AA) */
    .day-tab {
      flex: 1;
      padding: 9px 0;
      border: 2px solid #d1dbe8;
      border-radius: 10px;
      background: #fff;
      color: #566879;
      font-size: 1em;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .day-tab:hover { border-color: #3b82f6; color: #3b82f6; }

    .day-tab.active {
      background: #3b82f6;
      border-color: #3b82f6;
      color: #fff;
    }

    /* 포커스 표시 (2.4.7 AA) */
    .dark-toggle:focus-visible,
    .day-tab:focus-visible { outline: 2px solid #3b82f6; outline-offset: 2px; }

    .day-panel { display: none; }
    .day-panel.active { display: block; }

    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    /* #8fa0b4 → #566879 (1.4.3 AA) */
    .no-result {
      text-align: center;
      color: #566879;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    /* #aab4c0 → #566879 (1.4.3 AA), placeholder는 유지 */
    #hint {
      text-align: center;
      color: #566879;
      font-size: 1.105rem;
      margin-top: 8px;
    }

    .notice-box {
      width: 100%;
      max-width: 480px;
      background: #fff;
      border: 1.5px solid #d1dbe8;
      border-left: 4px solid #3b82f6;
      border-radius: 10px;
      padding: 22px 16px 8px;
      margin-bottom: 0;
      font-size: 0.95rem;
      color: #1a3a5c;
      text-align: left;
      position: relative;
      overflow: hidden;
    }

    .notice-box .notice-label {
      position: absolute;
      top: 8px;
      left: 14px;
      font-size: 0.78rem;
      font-weight: 700;
      color: #3b82f6;
      letter-spacing: 0.03em;
    }

    #noticeText {
      display: block;
      white-space: pre-line;
      word-break: keep-all;
      overflow-wrap: break-word;
      overflow: hidden;
      line-height: 1.6;
      margin-top: 12px;
      width: 100%;
    }

    .notice-box.empty {
      color: #aab4c0;
      font-size: 0.88rem;
      border-left-color: #d1dbe8;
    }

    body.dark .notice-box {
      background: #1a2636;
      border-color: #2a3a4e;
      border-left-color: #4d9cf0;
      color: #e2eaf4;
    }
    body.dark .notice-box.empty { color: #4a6278; border-left-color: #2a3a4e; }
    body.dark .notice-box .notice-label { color: #4d9cf0; }

    /* footer color #6b7a8d → #4e5f6e (1.4.3 AA) */
    footer {
      margin-top: 16px;
      font-size: 0.975rem;
      color: #4e5f6e;
      font-weight: 600;
      text-align: center;
      line-height: 1.7;
    }

    .dark-toggle {
      background: #fff;
      border: 1.5px solid #d1dbe8;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.85rem;
      cursor: pointer;
      color: #1a3a5c;
      font-family: inherit;
      font-weight: 600;
      transition: all 0.15s;
    }
    .dark-toggle:hover { border-color: #3b82f6; }

    /* ── 다크모드 ── */
    body.dark { background: #0f1923; }
    body.dark header h1 { color: #e2eaf4; }
    body.dark header p  { color: #6b7a8d; }
    body.dark .search-box input {
      background: #1a2636;
      border-color: #2a3a4e;
      color: #e2eaf4;
    }
    body.dark .search-box input::placeholder { color: #7a95ad; }
    body.dark #suggestions {
      background: #1a2636;
      border-color: #2a3a4e;
    }
    body.dark .suggestion-item { color: #e2eaf4; border-color: #2a3a4e; }
    body.dark .suggestion-item:hover { background: #1f3044; }
    body.dark .suggestion-item .sub { color: #4a6278; }
    body.dark .card {
      background: #1a2636;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    body.dark .card-header { border-color: #2a3a4e; }
    body.dark .card-header-text h2 { color: #e2eaf4; }
    body.dark .card-header-text p  { color: #94afc8; }
    body.dark .info-item { background: #111e2b; }
    body.dark .info-label { color: #94afc8; }
    body.dark .info-value { color: #e2eaf4; }
    body.dark .section-title { color: #4d9cf0; }
    body.dark .day-tab {
      background: #1a2636;
      border-color: #4a6278;
      color: #94afc8;
    }
    body.dark .day-tab:hover { border-color: #4d9cf0; color: #4d9cf0; }
    body.dark .day-tab.active {
      background: #1d4ed8;
      border-color: #1d4ed8;
      color: #fff;
    }
    body.dark .no-result { color: #4a6278; }
    body.dark #hint { color: #7a95ad; }
    body.dark footer { color: #7a95ad; }
    body.dark .dark-toggle {
      background: #1a2636;
      border-color: #2a3a4e;
      color: #e2eaf4;
    }


    /* ── 출석 체크 뷰 ── */
    #attendanceView { width: 100%; }

    .att-breadcrumb {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.82em;
      color: #566879;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .att-crumb-btn {
      background: none; border: none; padding: 4px 2px;
      color: #3b82f6; font-weight: 600; font-size: inherit; font-family: inherit;
      cursor: pointer; font-family: inherit;
    }
    .att-crumb-sep { color: #aab4c0; }
    .att-crumb-current { color: #1a3a5c; font-weight: 700; }
    body.dark .att-crumb-current { color: #e2eaf4; }
    body.dark .att-breadcrumb { color: #94afc8; }

    .att-section-title {
      font-size: 0.88em; font-weight: 700; color: #566879;
      margin-bottom: 12px; letter-spacing: 0.02em;
    }
    body.dark .att-section-title { color: #94afc8; }

    /* 일차 선택 */
    .att-day-grid { display: flex; gap: 10px; }
    .att-day-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; padding: 16px 8px;
      background: #fff; border: 2px solid #d1dbe8;
      border-radius: 14px; cursor: pointer;
      transition: all 0.15s; font-family: inherit;
    }
    .att-day-btn:hover { border-color: #3b82f6; background: #f0f6ff; }
    .att-day-btn:focus-visible { outline: 2px solid #3b82f6; outline-offset: 2px; }
    .att-day-btn .day-emoji { font-size: 1.5rem; }
    .att-day-btn .day-num  { font-size: 1rem; font-weight: 700; color: #1a3a5c; margin-top: 4px; }
    .att-day-btn .day-date { font-size: 0.72rem; color: #566879; margin-top: 2px; }
    body.dark .att-day-btn { background: #1a2636; border-color: #4a6278; }
    body.dark .att-day-btn .day-num  { color: #e2eaf4; }
    body.dark .att-day-btn .day-date { color: #94afc8; }
    body.dark .att-day-btn:hover { background: #1f3044; border-color: #3b82f6; }

    /* 스팟 선택 */
    .att-spot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .att-spot-btn {
      padding: 14px 10px; background: #fff;
      border: 2px solid #d1dbe8; border-radius: 12px;
      font-size: inherit; font-family: inherit;
      cursor: pointer; text-align: center; transition: all 0.15s;
    }
    .att-spot-btn:hover { border-color: #3b82f6; background: #f0f6ff; }
    .att-spot-btn:focus-visible { outline: 2px solid #3b82f6; outline-offset: 2px; }
    .att-spot-btn .spot-emoji { font-size: 1.6em; }
    .att-spot-btn .spot-label { font-size: 0.88em; font-weight: 700; color: #1a3a5c; margin-top: 6px; }
    body.dark .att-spot-btn { background: #1a2636; border-color: #4a6278; }
    body.dark .att-spot-btn .spot-label { color: #e2eaf4; }
    body.dark .att-spot-btn:hover { background: #1f3044; border-color: #3b82f6; }

    /* 조 선택 */
    .att-group-layout { display: flex; flex-direction: column; gap: 8px; }
    .att-group-row { display: flex; gap: 8px; }
    .att-group-row .att-group-btn { flex: 1; }
    .att-group-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .att-group-btn {
      padding: 12px 6px; background: #fff;
      border: 2px solid #d1dbe8; border-radius: 10px;
      font-size: inherit; font-family: inherit;
      font-weight: 700; color: #1a3a5c;
      cursor: pointer; text-align: center; transition: all 0.15s;
    }
    .att-group-btn:hover { border-color: #3b82f6; background: #f0f6ff; }
    .att-group-btn:focus-visible { outline: 2px solid #3b82f6; outline-offset: 2px; }
    .att-group-count { font-size: 0.72em; font-weight: 400; color: #566879; display: block; margin-top: 3px; }
    .att-group-btn.done { border-color: #10b981; background: #f0fdf4; }
    body.dark .att-group-btn { background: #1a2636; border-color: #4a6278; color: #e2eaf4; }
    body.dark .att-group-btn .att-group-count { color: #94afc8; }
    body.dark .att-group-btn:hover { background: #1f3044; border-color: #3b82f6; }
    body.dark .att-group-btn.done { background: #0d2b1e; border-color: #059669; }

    /* 출석 헤더 */
    .att-header {
      background: #fff; border-radius: 14px;
      padding: 16px; margin-bottom: 12px;
      box-shadow: 0 2px 12px rgba(26,58,92,0.07);
      position: sticky; top: 0; z-index: 50;
      transition: border-radius 0.15s;
    }
    .att-header.stuck {
      border-radius: 0 0 14px 14px;
      box-shadow: 0 4px 16px rgba(26,58,92,0.13);
    }
    body.dark .att-header { background: #1a2636; box-shadow: 0 2px 12px rgba(0,0,0,0.25); }
    body.dark .att-header.stuck { box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
    .att-header-inner {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .att-header-left { flex: 1; min-width: 0; }
    .att-title { font-size: 1.05em; font-weight: 700; color: #1a3a5c; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
    body.dark .att-title { color: #e2eaf4; }
    .att-subtitle { font-size: 0.82em; color: #566879; }
    body.dark .att-subtitle { color: #94afc8; }
    .att-count-small {
      display: inline-block; background: #dbeafe; color: #1d4ed8;
      padding: 2px 9px; border-radius: 20px;
      font-size: 0.78rem; font-weight: 700;
    }
    body.dark .att-count-small { background: #1e3a5f; color: #93c5fd; }
    .att-count-right {
      display: flex; flex-direction: row; align-items: center; gap: 8px; flex-shrink: 0;
    }
    .att-count-big {
      font-size: 2rem; font-weight: 800; color: #1d4ed8;
      background: #dbeafe; border-radius: 14px;
      padding: 6px 16px; white-space: nowrap;
      line-height: 1.2;
    }
    body.dark .att-count-big { background: #1e3a5f; color: #93c5fd; }
    .att-reset-btn {
      background: #bbf7d0; border: none; cursor: pointer;
      font-size: 1.4rem; line-height: 1;
      width: 52px; height: 52px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.2s;
      flex-shrink: 0;
    }
    .att-reset-btn:hover { background: #86efac; transform: rotate(-30deg); }
    .att-reset-btn:active { transform: rotate(-180deg); }
    body.dark .att-reset-btn { background: #14532d; }
    body.dark .att-reset-btn:hover { background: #166534; }

    /* 체크리스트 */
    .att-list {
      background: #fff; border-radius: 14px; padding: 6px;
      box-shadow: 0 2px 12px rgba(26,58,92,0.07);
    }
    body.dark .att-list { background: #1a2636; }

    .att-member-item {
      display: flex; align-items: center; gap: 12px;
      padding: 6px 10px; border-radius: 10px;
      font-size: inherit; font-family: inherit;
      cursor: pointer; background: none; border: none;
      width: 100%; text-align: left;
      transition: background 0.12s;
    }
    .att-member-item:hover { background: #f0f6ff; }
    .att-member-item:focus-visible { outline: 2px solid #3b82f6; outline-offset: -2px; border-radius: 10px; }
    body.dark .att-member-item:hover { background: #1f3044; }

    .att-check-icon {
      width: 34px; height: 34px; border-radius: 50%;
      border: 2px solid #d1dbe8; background: #f7fafd;
      font-size: 1.1em; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.15s;
      color: #aab4c0;
    }
    .att-check-icon.present { background: #10b981; border-color: #10b981; color: #fff; }
    body.dark .att-check-icon { background: #111e2b; border-color: #4a6278; color: #4a6278; }
    body.dark .att-check-icon.present { background: #059669; border-color: #059669; color: #fff; }

    .att-member-item.present {
      background: #ecfdf5;
    }
    body.dark .att-member-item.present { background: #0a2d1f; }

    .att-member-info { flex: 1; min-width: 0; }
    .att-member-name { font-size: 0.95em; font-weight: 600; color: #1a3a5c; }
    .att-member-ldap { font-size: 0.76em; color: #566879; margin-top: 1px; }
    body.dark .att-member-name { color: #e2eaf4; }
    body.dark .att-member-ldap { color: #94afc8; }

    .att-leader-badge {
      display: inline-block; font-size: 0.68em; font-weight: 700;
      background: #fef3c7; color: #92400e;
      padding: 1px 6px; border-radius: 6px;
      margin-left: 5px; vertical-align: middle;
      letter-spacing: 0.02em;
    }
    body.dark .att-leader-badge { background: #451a03; color: #fcd34d; }

    /* 조 명단 확인 뷰 — 텍스트 요소를 em 단위로 설정해 applyFontSize() 와 연동 */

    /* 불참 섹션 */
    .att-absent-section { margin-top: 20px; }
    .att-absent-section-title {
      font-size: 0.8em; font-weight: 700; color: #94a3b8;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 0 2px; margin-bottom: 8px;
    }
    .att-absent-card {
      background: #f8fafc; border: 1.5px solid #e2e8f0;
      border-radius: 14px; padding: 12px 14px; margin-bottom: 10px;
    }
    body.dark .att-absent-card { background: #111e2b; border-color: #2a3a4e; }
    .att-absent-card-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
    }
    .att-absent-card-label {
      font-size: 0.85em; font-weight: 700; color: #475569; flex: 1;
    }
    body.dark .att-absent-card-label { color: #94afc8; }
    .att-absent-card-count {
      font-size: 0.8em; font-weight: 700;
      background: #e2e8f0; color: #64748b;
      border-radius: 20px; padding: 2px 10px;
    }
    body.dark .att-absent-card-count { background: #1e3044; color: #94afc8; }
    .att-absent-item {
      display: flex; align-items: center; gap: 10px;
      padding: 5px 4px; border-radius: 8px;
    }
    .att-absent-icon {
      width: 28px; height: 28px; border-radius: 8px;
      border: 2px solid #cbd5e1; background: #f1f5f9;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 800; color: #94a3b8;
      flex-shrink: 0;
    }
    body.dark .att-absent-icon { border-color: #334155; background: #1a2636; color: #64748b; }
    .att-absent-name { font-size: 0.9em; font-weight: 600; color: #64748b; }
    .att-absent-sub  { font-size: 0.73em; color: #94a3b8; margin-top: 1px; }
    body.dark .att-absent-name { color: #94afc8; }
    body.dark .att-absent-sub  { color: #64748b; }
  </style>
</head>
<body>

<!-- 건너뛰기 링크 (2.4.1 A) -->
<a href="#main-content" class="skip-nav">본문 바로가기</a>

<header>
  <div class="toolbar">
    <button class="dark-toggle team-btn" onclick="toggleAttView()" id="teamBtn" aria-label="조 명단 확인">👥 조 명단 확인</button>
    <div class="toolbar-right">
      <button class="dark-toggle" onclick="changeFontSize(-1)" id="btnSmall" aria-label="글자 크기 줄이기">A−</button>
      <button class="dark-toggle" onclick="changeFontSize(1)" id="btnLarge" aria-label="글자 크기 크게">A+</button>
      <button class="dark-toggle" onclick="toggleDark()" id="darkBtn" aria-label="다크모드 켜기">🌙 다크</button>
    </div>
  </div>
  <div class="notice-box empty" id="noticeBox" role="region" aria-label="공지사항">
    <div class="notice-label"><span aria-hidden="true">📢</span> 공지사항</div>
    <span id="noticeText" aria-live="polite" aria-atomic="true">불러오는 중...</span>
  </div>
</header>

<!-- main 랜드마크 (1.3.1 A) -->
<main id="main-content">

<!-- 내 정보 조회 뷰 -->
<div id="mainView">
  <div class="search-box">
    <label for="searchInput" class="sr-only">이름 또는 영문 ID로 검색</label>
    <input type="text" id="searchInput" placeholder="예) 헤이든, david.0726" autocomplete="off"
      aria-autocomplete="list" aria-controls="suggestions" aria-label="이름 또는 영문 ID로 검색"
      aria-expanded="false" />
    <span class="icon" aria-hidden="true">🔍</span>
  </div>
  <div id="suggestions" role="listbox" aria-label="검색 후보 목록"></div>
  <div id="result" aria-live="polite" aria-atomic="true"></div>
  <p id="hint" aria-live="polite">한글 이름 또는 영문 ID 입력</p>
</div>

<!-- 출석 체크 뷰 -->
<div id="attendanceView" style="display:none" aria-label="출석 체크">
  <div id="attContent" aria-live="polite"></div>
</div>

<footer><span aria-hidden="true">✈️</span> 2026 제주 미션트립<br>링키지랩</footer>

</main>

<script>
// ── 1. 데이터 로드 및 관리 로직 ──────────────────────────────
let PEOPLE = [];
const input = document.getElementById('searchInput');
const suggestionsEl = document.getElementById('suggestions');
const resultEl = document.getElementById('result');
const hintEl = document.getElementById('hint');
const GAS_URL = 'https://script.google.com/macros/s/AKfycbz9kD6pl9ARQAoq07cSxARhPhvF73iy-Rj9nFlvXxO5VkJEkP-IFmPg6DZp6rvGZuM/exec';

// [기능 1] 로컬 스토리지 캐시 확인 (0초 로딩 구현)
const cachedData = localStorage.getItem('missionTripData');
if (cachedData) {
  PEOPLE = JSON.parse(cachedData);
  input.disabled = false;
  input.placeholder = "예) 헤이든, david.0726";
} else {
  // 처음 접속하여 캐시가 없는 경우에만 로딩 표시
  input.disabled = true;
  input.placeholder = "최신 데이터를 불러오는 중입니다... ⏳";
}

// 실시간 데이터 패치 함수
function refreshFromSheet() {
  fetch(GAS_URL)
    .then(r => r.json())
    .then(data => {
      if (data.notice !== undefined) {
        const box = document.getElementById('noticeBox');
        const txt = document.getElementById('noticeText');
        if (data.notice && data.notice.trim()) {
          txt.textContent = data.notice.trim();
          box.classList.remove('empty');
        } else {
          txt.textContent = '등록된 공지사항이 없습니다.';
          box.classList.add('empty');
        }
      }

      if (data.people && data.people.length) {
        PEOPLE = data.people;

        // 최신 데이터 로컬 스토리지에 저장
        localStorage.setItem('missionTripData', JSON.stringify(PEOPLE));

        // 로딩 완료 후 검색창 활성화
        input.disabled = false;
        input.placeholder = "예) 헤이든, david.0726";

        // [추가 기능] 현재 보고 있는 카드가 있다면 실시간으로 데이터 업데이트
        const currentLdap = document.querySelector('.card-header-text p')?.innerText;
        if (currentLdap) {
          const updatedPerson = PEOPLE.find(p => p.ldap === currentLdap);
          if (updatedPerson) {
            showCard(updatedPerson);
            applyFontSize();
          }
        }
        console.log("데이터 최신화 완료:", new Date().toLocaleTimeString());
      }
    })
    .catch(err => {
      console.error("데이터 로드 실패:", err);
      if (!cachedData) input.placeholder = "데이터 로딩 실패. 다시 시도해주세요.";
    });
}

// 초기 실행
refreshFromSheet();

// [기능 2] 1분마다 자동 백그라운드 갱신
setInterval(refreshFromSheet, 60 * 1000);

// [기능 3] 사용자가 화면을 다시 보게 된 순간(탭 전환/화면 켬) 즉시 갱신
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    refreshFromSheet();
  }
});


// ── 2. 검색 및 제어 로직 (기존 기능 유지) ───────────────────────

function getMatches(q) {
  return PEOPLE.filter(p =>
    (p.nickname && p.nickname.toLowerCase().includes(q)) ||
    (p.name && p.name.toLowerCase().includes(q)) ||
    (p.ldap && p.ldap.toLowerCase().includes(q))
  );
}

function selectPerson(p) {
  input.value = p.nickname || p.name || '';
  suggestionsEl.style.display = 'none';
  suggestionsEl.innerHTML = '';
  // aria-expanded 연동 (2.1.1 A)
  input.setAttribute('aria-expanded', 'false');
  showCard(p);
  applyFontSize();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

input.addEventListener('input', () => {
  const q = input.value.trim().toLowerCase();
  suggestionsEl.innerHTML = '';
  suggestionsEl.style.display = 'none';
  // aria-expanded 연동 (2.1.1 A)
  input.setAttribute('aria-expanded', 'false');
  resultEl.innerHTML = '';

  if (!q) { hintEl.style.display = 'block'; return; }
  hintEl.style.display = 'none';

  const matches = getMatches(q);
  if (matches.length === 0) return;

  suggestionsEl.style.display = 'block';
  // aria-expanded 연동 (2.1.1 A)
  input.setAttribute('aria-expanded', 'true');
  matches.slice(0, 8).forEach(p => {
    const div = document.createElement('div');
    div.className = 'suggestion-item';
    div.setAttribute('role', 'option');
    div.setAttribute('tabindex', '0');
    div.setAttribute('aria-label', `${p.nickname}${p.name ? ' · ' + p.name : ''}, ${p.ldap}`);
    div.innerHTML = `<div>${p.nickname}${p.name ? ' · ' + p.name : ''}</div><div class="sub">${p.ldap}</div>`;
    div.addEventListener('click', () => selectPerson(p));
    div.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectPerson(p); } });
    suggestionsEl.appendChild(div);
  });
});

// ArrowDown/ArrowUp 키보드 탐색 (2.1.1 A)
input.addEventListener('keydown', e => {
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    const items = suggestionsEl.querySelectorAll('.suggestion-item');
    if (items.length > 0) items[0].focus();
    return;
  }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    const items = suggestionsEl.querySelectorAll('.suggestion-item');
    if (items.length > 0) items[items.length - 1].focus();
    return;
  }
  if (e.key !== 'Enter') return;
  e.preventDefault();
  const q = input.value.trim().toLowerCase();
  if (!q) return;
  const matches = getMatches(q);
  if (matches.length === 0) {
    suggestionsEl.style.display = 'none';
    input.setAttribute('aria-expanded', 'false');
    // role="alert" 추가 (3.3.1 A)
    resultEl.innerHTML = '<div class="no-result" role="alert">검색 결과가 없습니다.<br>이름 또는 영문 ID를 다시 확인해주세요.</div>';
  } else {
    selectPerson(matches[0]);
  }
});

// suggestion-item 간 ArrowDown/ArrowUp 이동 (2.1.1 A)
suggestionsEl.addEventListener('keydown', e => {
  const items = Array.from(suggestionsEl.querySelectorAll('.suggestion-item'));
  const focused = document.activeElement;
  const idx = items.indexOf(focused);
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (idx < items.length - 1) items[idx + 1].focus();
    return;
  }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (idx > 0) {
      items[idx - 1].focus();
    } else {
      input.focus();
    }
    return;
  }
  if (e.key === 'Escape') {
    suggestionsEl.style.display = 'none';
    input.setAttribute('aria-expanded', 'false');
    input.focus();
  }
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-box') && !e.target.closest('#suggestions')) {
    suggestionsEl.style.display = 'none';
    input.setAttribute('aria-expanded', 'false');
  }
});


// ── 3. UI 렌더링 함수 ────────────────────────────────────

function val(v) { return v && v !== 'None' && v !== 'nan' ? v : '—'; }

function showCard(p) {
  const initial = p.nickname ? p.nickname[0] : (p.name ? p.name[0] : '?');
  const activeTabId = document.querySelector('.day-tab.active')?.getAttribute('aria-controls') || 'day1';

  resultEl.innerHTML = `
    <div class="card" tabindex="-1">
      <div class="card-header">
        <div class="avatar" aria-hidden="true">${initial}</div>
        <div class="card-header-text">
          <h2>${val(p.nickname)}${p.name && p.name !== 'None' ? ` <span style="font-weight:400;font-size:0.9em;color:#566879">· ${val(p.name)}</span>` : ''}</h2>
          <p>${val(p.ldap)}</p>
        </div>
      </div>

      <div class="card-body">
      <div class="section-title">기본 정보</div>
      <div class="info-grid">
        <div class="info-item" role="group" aria-label="버스">
          <div class="info-label"><span aria-hidden="true">🚌</span> 버스</div>
          <div class="info-value big">${val(p.bus)}</div>
        </div>
        <div class="info-item" role="group" aria-label="조">
          <div class="info-label"><span aria-hidden="true">👥</span> 조</div>
          <div class="info-value big">${val(p.group)}</div>
        </div>
        <div class="info-item" role="group" aria-label="숙소">
          <div class="info-label"><span aria-hidden="true">🏠</span> 숙소</div>
          <div class="info-value">${val(p.accommodation)}</div>
        </div>
        <div class="info-item" role="group" aria-label="방장">
          <div class="info-label"><span aria-hidden="true">🔑</span> 방장</div>
          <div class="info-value">${val(p.room_leader)}</div>
        </div>
        <div class="info-item" role="group" aria-label="조장">
          <div class="info-label"><span aria-hidden="true">🙋</span> 조장</div>
          <div class="info-value">${val(p.leader)}</div>
        </div>
      </div>

      <div class="day-tabs" role="tablist" aria-label="일차 선택">
        <button id="tab-day1" class="day-tab ${activeTabId === 'day1' ? 'active' : ''}" role="tab" aria-selected="${activeTabId === 'day1'}" aria-controls="day1" onclick="switchDay(this, 'day1')">1일차</button>
        <button id="tab-day2" class="day-tab ${activeTabId === 'day2' ? 'active' : ''}" role="tab" aria-selected="${activeTabId === 'day2'}" aria-controls="day2" onclick="switchDay(this, 'day2')">2일차</button>
        <button id="tab-day3" class="day-tab ${activeTabId === 'day3' ? 'active' : ''}" role="tab" aria-selected="${activeTabId === 'day3'}" aria-controls="day3" onclick="switchDay(this, 'day3')">3일차</button>
      </div>

      <div id="day1" class="day-panel ${activeTabId === 'day1' ? 'active' : ''}" role="tabpanel" aria-labelledby="tab-day1">
        <div class="section-title"><span aria-hidden="true">✈️</span> 김포 → 제주</div>
        <div class="info-grid">
          <div class="info-item full" role="group" aria-label="김포공항 집결"><div class="info-label"><span aria-hidden="true">⏰</span> 김포공항 집결</div><div class="info-value">${val(p.assembly_time)}</div></div>
          <div class="info-item" role="group" aria-label="항공사"><div class="info-label">항공사</div><div class="info-value">${val(p.dep_airline)}</div></div>
          <div class="info-item" role="group" aria-label="편명"><div class="info-label">편명</div><div class="info-value">${val(p.dep_flight)}</div></div>
          <div class="info-item" role="group" aria-label="탑승구"><div class="info-label"><span aria-hidden="true">🚪</span> 탑승구</div><div class="info-value">${val(p.dep_gate)}</div></div>
          <div class="info-item" role="group" aria-label="출발 시간"><div class="info-label"><span aria-hidden="true">⏱</span> 출발 시간</div><div class="info-value">${val(p.dep_time)}</div></div>
        </div>
        <div class="section-title"><span aria-hidden="true">🏢</span> 카카오 스페이스</div>
        <div class="info-grid">
          <div class="info-item full" role="group" aria-label="카카오 투어"><div class="info-label">투어 여부</div><div class="info-value">${val(p.kakao_tour)}</div></div>
        </div>
      </div>

      <div id="day2" class="day-panel ${activeTabId === 'day2' ? 'active' : ''}" role="tabpanel" aria-labelledby="tab-day2">
        <div class="section-title"><span aria-hidden="true">🌺</span> 하효마을</div>
        <div class="info-grid">
          <div class="info-item full" role="group" aria-label="하효마을 점심식사"><div class="info-label">점심식사</div><div class="info-value">${val(p.haehyo_lunch)}</div></div>
        </div>
        <div class="section-title"><span aria-hidden="true">🍽️</span> 더클리프</div>
        <div class="info-grid">
          <div class="info-item" role="group" aria-label="음료"><div class="info-label">음료</div><div class="info-value">${val(p.cliff_drink)}</div></div>
          <div class="info-item" role="group" aria-label="푸드박스"><div class="info-label">푸드박스</div><div class="info-value">${val(p.cliff_food)}</div></div>
        </div>
      </div>

      <div id="day3" class="day-panel ${activeTabId === 'day3' ? 'active' : ''}" role="tabpanel" aria-labelledby="tab-day3">
        <div class="section-title"><span aria-hidden="true">🌿</span> 치유의숲</div>
        <div class="info-grid">
          <div class="info-item" role="group" aria-label="프로그램"><div class="info-label">프로그램</div><div class="info-value">${val(p.forest_program)}</div></div>
          <div class="info-item" role="group" aria-label="프로그램 조장"><div class="info-label">프로그램 조장</div><div class="info-value">${val(p.forest_group)}</div></div>
        </div>
        <div class="section-title"><span aria-hidden="true">✈️</span> 제주 → 김포</div>
        <div class="info-grid">
          <div class="info-item" role="group" aria-label="항공사"><div class="info-label">항공사</div><div class="info-value">${val(p.ret_airline)}</div></div>
          <div class="info-item" role="group" aria-label="편명"><div class="info-label">편명</div><div class="info-value">${val(p.ret_flight)}</div></div>
          <div class="info-item" role="group" aria-label="탑승구"><div class="info-label"><span aria-hidden="true">🚪</span> 탑승구</div><div class="info-value">${val(p.ret_gate)}</div></div>
          <div class="info-item" role="group" aria-label="출발 시간"><div class="info-label"><span aria-hidden="true">⏱</span> 출발 시간</div><div class="info-value">${val(p.ret_time)}</div></div>
        </div>
      </div>
      </div>
    </div>
  `;
}

const FONT_STEPS = [0.8, 0.9, 1.0, 1.1, 1.2, 1.3, 1.4];
let fontIdx = parseInt(localStorage.getItem('fontIdx') ?? '4');

function applyFontSize() {
  const scale = FONT_STEPS[fontIdx] + 'rem';
  document.querySelectorAll('.card-body').forEach(c => c.style.fontSize = scale);
  const noticeText = document.getElementById('noticeText');
  if (noticeText) noticeText.style.fontSize = scale;
  // 조 명단 확인 뷰 — em 단위 CSS와 연동
  const attView = document.getElementById('attendanceView');
  if (attView) attView.style.fontSize = scale;
}

function changeFontSize(dir) {
  fontIdx = Math.max(0, Math.min(FONT_STEPS.length - 1, fontIdx + dir));
  localStorage.setItem('fontIdx', fontIdx);
  applyFontSize();
}

function toggleDark() {
  const isDark = document.body.classList.toggle('dark');
  const btn = document.getElementById('darkBtn');
  btn.textContent = isDark ? '☀️ 라이트' : '🌙 다크';
  btn.setAttribute('aria-label', isDark ? '라이트모드로 전환' : '다크모드로 전환');
  localStorage.setItem('darkMode', isDark);
}

if (localStorage.getItem('darkMode') === 'true') {
  document.body.classList.add('dark');
  document.getElementById('darkBtn').textContent = '☀️ 라이트';
}

function switchDay(btn, panelId) {
  btn.closest('.card').querySelectorAll('.day-tab').forEach(t => {
    t.classList.remove('active');
    t.setAttribute('aria-selected', 'false');
  });
  btn.closest('.card').querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  btn.setAttribute('aria-selected', 'true');
  btn.closest('.card').querySelector('#' + panelId).classList.add('active');
}

// 폰트 크기 초기화 적용

/* ─ 그룹 목록 반환 (ROSTER_DATA 기반) ─ */
function getGroupsForSpot(spotKey) {
  const spotData = ROSTER_DATA[spotKey];
  if (!spotData) return {};
  const groups = {};
  Object.entries(spotData)
    .sort((a, b) => a[1].colIndex - b[1].colIndex)
    .forEach(([groupName, gData]) => {
      groups[groupName] = gData.members.map(ldap =>
        PEOPLE.find(p => p.ldap === ldap) || { ldap, nickname: '', name: '', group: groupName }
      );
    });
  return groups;
}

/* ─ 조장 LDAP ─ */
function getLeaderLdap(spotKey, groupName) {
  return ROSTER_DATA[spotKey]?.[groupName]?.leader || null;
}

function getCheckStatus(spotKey, group, ldap) {
  return attChecks[spotKey]?.[group]?.[ldap] || 'unchecked';
}

    btn.textContent = '🔍 내 정보';
    btn.setAttribute('aria-label', '내 정보 조회로 돌아가기');
    attDay = null; attSpot = null; attGroup = null;
    renderAttView();
  } else {
    attView.style.display  = 'none';
    mainView.style.display = '';
    btn.textContent = '👥 조 명단 확인';
    btn.setAttribute('aria-label', '조 명단 확인');
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ─ Depth 1/2/3 렌더 ─ */
function renderAttView() {
  const el = document.getElementById('attContent');

  /* Depth 1 — 일차 선택 */
  if (!attDay) {
    el.innerHTML = `
      <div class="att-section-title">일차를 선택하세요</div>
      <div class="att-day-grid">
        ${[1,2,3].map(d => {
          const emojis = ['🌅','🌞','🌆'];
          const dates  = ['4/23 (목)','4/24 (금)','4/25 (토)'];
          return `<button class="att-day-btn" onclick="setAttDay(${d})" aria-label="${d}일차 선택">
            <span class="day-emoji">${emojis[d-1]}</span>
            <span class="day-num">${d}일차</span>
            <span class="day-date">${dates[d-1]}</span>
          </button>`;
        }).join('')}
      </div>`;
    applyFontSize();
    return;
  }

  /* Depth 2 — 스팟 선택 */
  if (!attSpot) {
    const daySpots = SPOTS_CONFIG.filter(s => s.day === attDay);
    el.innerHTML = `
      ${breadcrumb([
        { label: '일차', onclick: 'setAttDay(null)' },
        { label: `${attDay}일차`, current: true }
      ])}
      <div class="att-section-title">${attDay}일차 스팟을 선택하세요</div>
      <div class="att-spot-grid">
        ${daySpots.map(s => `
          <button class="att-spot-btn" onclick="setAttSpot('${s.key}')" aria-label="${s.label} 선택">
            <div class="spot-emoji">${s.emoji}</div>
            <div class="spot-label">${s.label}</div>
          </button>`).join('')}
      </div>`;
    applyFontSize();
    return;
  }

  /* Depth 3 — 조 선택 */
  renderAttGroupView();
}

function renderAttGroupView() {
  const el       = document.getElementById('attContent');
  const spotInfo = SPOTS_CONFIG.find(s => s.key === attSpot);
  const groups   = getGroupsForSpot(attSpot);

  // 고정 레이아웃: 숫자조 4개씩, 마지막 줄 칸조·멜로니조·선발대
  const FIXED_ROWS = [
    ['1조','2조','3조','4조'],
    ['5조','6조','7조','8조'],
    ['9조','10조','11조','12조'],
    ['13조','14조','15조'],
    ['칸조','멜로니조','선발대'],
  ];
  const fixedAll = FIXED_ROWS.flat();
  // 고정 레이아웃에 없는 나머지 조 (제주항공1·티웨이·AI+플랫폼 등)
  const extraKeys = Object.keys(groups).filter(g => !fixedAll.includes(g));

  function groupBtn(g) {
    const members = groups[g];
    if (!members || members.length === 0) return '';
    const present = members.filter(p => getCheckStatus(attSpot, g, p.ldap) === 'present').length;
    const allDone = present === members.length;
    return `<button class="att-group-btn${allDone ? ' done' : ''}"
      onclick="setAttGroup('${g.replace(/'/g, "\\'")}')"
      aria-label="${g}, ${members.length}명">
      ${g}
      <span class="att-group-count">${present}/${members.length}명</span>
    </button>`;
  }

  const fixedHTML = FIXED_ROWS.map(row => {
    const btns = row.map(g => groupBtn(g)).filter(Boolean);
    if (!btns.length) return '';
    return `<div class="att-group-row">${btns.join('')}</div>`;
  }).join('');

  const extraBtns = extraKeys.map(g => groupBtn(g)).filter(Boolean);
  const extraHTML = (() => {
    if (!extraBtns.length) return '';
    // extras가 5개 초과이거나 고정 레이아웃이 없으면 3열 그리드
    if (extraBtns.length > 4 || !fixedHTML.trim()) {
      return `<div class="att-group-grid">${extraBtns.join('')}</div>`;
    }
    return `<div class="att-group-row">${extraBtns.join('')}</div>`;
  })();

  el.innerHTML = `
    ${breadcrumb([
      { label: '일차',  onclick: 'setAttDay(null)' },
      { label: `${attDay}일차`, onclick: `setAttDay(${attDay})` },
      { label: `${spotInfo.emoji} ${spotInfo.label}`, current: true }
    ])}
    <div class="att-section-title">조를 선택하세요</div>
    <div class="att-group-layout">
      ${fixedHTML}
      ${extraHTML}
    </div>`;
  applyFontSize();
}

/* ─ 상태 변경 헬퍼 ─ */
function setAttDay(d) {
  attDay = d; attSpot = null; attGroup = null;
  renderAttView();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function setAttSpot(key) {
  attSpot = key; attGroup = null;
  renderAttView();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function setAttGroup(g) {
  attGroup = g;
  if (g === null) renderAttGroupView();
  else renderAttChecklist();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ─ Depth 4 — 조원 목록 ─ */
function renderAttChecklist() {
  const el         = document.getElementById('attContent');
  const spotInfo   = SPOTS_CONFIG.find(s => s.key === attSpot);
  const groups     = getGroupsForSpot(attSpot);
  const members    = groups[attGroup] || [];
  const spotKey    = attSpot;
  const groupName  = attGroup;
  const leaderLdap = getLeaderLdap(spotKey, groupName);

  const presentCnt = members.filter(p => getCheckStatus(spotKey, groupName, p.ldap) === 'present').length;

  const items = members.map(p => {
    const st          = getCheckStatus(spotKey, groupName, p.ldap);
    const isPresent   = st === 'present';
    const icon        = isPresent ? 'V' : 'O';
    const cls         = isPresent ? 'present' : '';
    const isLeader    = leaderLdap && p.ldap === leaderLdap;
    const statusLabel = isPresent ? '출석' : '미확인';
    const displayName = p.nickname || p.name || p.ldap;
    const subName     = (p.name && p.name !== p.nickname && p.name !== 'None') ? ` · ${p.name}` : '';
    // LDAP 형식(점 포함, 한글 없음)일 때만 서브라벨 표시
    const isLdapFmt   = p.ldap && p.ldap.includes('.') && !/[가-힣\s]/.test(p.ldap);
    // 치유의숲프로그램은 부서명 표시, 나머지는 LDAP 표시
    const deptLabel   = (attSpot === '치유의숲프로그램' && DEPT_DATA[p.ldap]) ? DEPT_DATA[p.ldap] : null;
    const subLabel    = deptLabel
      ? deptLabel
      : (isLdapFmt ? `${p.ldap}${subName}` : (subName ? subName.replace(/^ · /, '') : ''));
    const leaderBadge = isLeader ? '<span class="att-leader-badge" aria-label="조장">조장</span>' : '';
    return `<button class="att-member-item${isPresent ? ' present' : ''}" data-ldap="${p.ldap}"
        onclick="toggleCheck('${spotKey}','${groupName.replace(/'/g, "\\'")}','${p.ldap}')"
        aria-label="${displayName}${isLeader ? ' (조장)' : ''} 출석 상태 ${statusLabel}, 클릭하여 변경">
      <div class="att-check-icon ${cls}" aria-hidden="true">${icon}</div>
      <div class="att-member-info">
        <div class="att-member-name">${displayName}${leaderBadge}</div>
        ${subLabel ? `<div class="att-member-ldap">${subLabel}</div>` : ''}
      </div>
    </button>`;
  }).join('');

  el.innerHTML = `
    ${breadcrumb([
      { label: '일차',  onclick: 'setAttDay(null)' },
      { label: `${attDay}일차`, onclick: `setAttDay(${attDay})` },
      { label: `${spotInfo.emoji} ${spotInfo.label}`, onclick: 'setAttGroup(null)' },
      { label: groupName, current: true }
    ])}
    <div class="att-header">
      <div class="att-header-inner">
        <div class="att-header-left">
          <div class="att-title">${groupName}</div>
          <div class="att-subtitle">${spotInfo.emoji} ${spotInfo.label} · ${attDay}일차</div>
        </div>
        <div class="att-count-right">
          <span class="att-count-big" id="attCountBadge">${presentCnt}/${members.length}</span>
          <button class="att-reset-btn" onclick="resetAllChecks('${spotKey}','${groupName.replace(/'/g, "\\'")}')" aria-label="전체 체크 초기화">🔄</button>
        </div>
      </div>
    </div>
    <div class="att-list">
      ${items || '<div class="no-result" style="padding:24px 0">이 스팟에 해당 조 인원이 없습니다.</div>'}
    </div>
    ${renderAbsentSection(spotKey, groupName)}`;


  // sticky header — .stuck 클래스로 상단 모서리 제거
  const header = el.querySelector('.att-header');
  if (header) {
    const observer = new IntersectionObserver(
      ([e]) => header.classList.toggle('stuck', e.intersectionRatio < 1),
      { threshold: [1], rootMargin: '0px 0px 0px 0px' }
    );
    observer.observe(header);
  }
  applyFontSize();
}

/* ─ 불참 섹션 렌더링 ─ */
function renderAbsentSection(spotKey, groupName) {
  const raw = ROSTER_DATA[spotKey]?.[groupName]?.absentGroups;
  if (!raw || !raw.length) return '';

  // 멤버가 하나라도 있는 그룹만 표시
  const groups = raw.filter(g => g.members && g.members.length > 0);
  if (!groups.length) return '';

  const totalAbsent = groups.reduce((s, g) => s + g.members.length, 0);

  const cards = groups.map(g => {
    const rows = g.members.map(ldap => {
      const p = PEOPLE.find(x => x.ldap === ldap) || { ldap, nickname: '', name: '' };
      const displayName = p.nickname || p.name || ldap;
      const isLdapFmt = ldap.includes('.') && !/[가-힣\s]/.test(ldap);
      const subName = (p.name && p.name !== p.nickname && p.name !== 'None') ? ` · ${p.name}` : '';
      const subLabel = isLdapFmt ? `${ldap}${subName}` : (subName ? subName.replace(/^ · /, '') : '');
      return `<div class="att-absent-item">
        <div class="att-absent-icon" aria-hidden="true">O</div>
        <div>
          <div class="att-absent-name">${displayName}</div>
          ${subLabel ? `<div class="att-absent-sub">${subLabel}</div>` : ''}
        </div>
      </div>`;
    }).join('');

    return `<div class="att-absent-card">
      <div class="att-absent-card-header">
        <div class="att-absent-card-label">⚠️ ${g.label}</div>
        <div class="att-absent-card-count">${g.members.length}명</div>
      </div>
      ${rows}
    </div>`;
  }).join('');

  return `<div class="att-absent-section">
    <div class="att-absent-section-title">현장에 없는 크루 · ${totalAbsent}명</div>
    ${cards}
  </div>`;
}

/* ─ 토글 (2-state: O → V → O) ─ */
function toggleCheck(spotKey, groupName, ldap) {
  if (!attChecks[spotKey]) attChecks[spotKey] = {};
  if (!attChecks[spotKey][groupName]) attChecks[spotKey][groupName] = {};
  const cur  = attChecks[spotKey][groupName][ldap] || 'unchecked';
  const next = cur === 'unchecked' ? 'present' : 'unchecked';

  if (next === 'unchecked') delete attChecks[spotKey][groupName][ldap];
  else attChecks[spotKey][groupName][ldap] = next;
  saveAttChecks();

  const item = document.querySelector(`[data-ldap="${ldap}"]`);
  if (item) {
    const icon = item.querySelector('.att-check-icon');
    icon.className   = 'att-check-icon' + (next === 'present' ? ' present' : '');
    icon.textContent = next === 'present' ? 'V' : 'O';
    item.classList.toggle('present', next === 'present');
    const statusLabel = next === 'present' ? '출석' : '미확인';
    const dispName = item.querySelector('.att-member-name')?.textContent || ldap;
    item.setAttribute('aria-label', `${dispName} 출석 상태 ${statusLabel}, 클릭하여 변경`);
  }

  const members    = getGroupsForSpot(spotKey)[groupName] || [];
  const presentCnt = members.filter(p => getCheckStatus(spotKey, groupName, p.ldap) === 'present').length;
  const countText = `${presentCnt}/${members.length}`;
  const badge = document.getElementById('attCountBadge');
  if (badge) badge.textContent = countText;
}


function resetAllChecks(spotKey, groupName) {
  if (!attChecks[spotKey]?.[groupName]) return;
  delete attChecks[spotKey][groupName];
  saveAttChecks();
  renderAttChecklist();
}

/* ─ PIN — 세션 캐시 (탭 닫기 전까지 유효) ─ */

/* ─ 브레드크럼 헬퍼 ─ */
function breadcrumb(items) {
  const parts = items.map(it => {
    if (it.current) return `<span class="att-crumb-current">${it.label}</span>`;
    return `<button class="att-crumb-btn" onclick="${it.onclick};window.scrollTo({top:0,behavior:'smooth'})">${it.label}</button>`;
  });
  return `<div class="att-breadcrumb">${parts.reduce((acc, p, i) => acc + (i > 0 ? '<span class="att-crumb-sep">›</span>' : '') + p, '')}</div>`;
}

</script>
